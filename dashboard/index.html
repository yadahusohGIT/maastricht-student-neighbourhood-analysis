<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Maastricht Student Neighbourhood Dashboard</title><script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script><style>body{font-family:Arial,sans-serif;margin:0;background:#f5f6f8;color:#17191c}header,main{max-width:1100px;margin:auto;padding:24px}header{background:white;max-width:none;border-bottom:1px solid #ddd}.panel{background:white;border:1px solid #ddd;border-radius:12px;padding:18px;margin-top:16px}.note{border-left:4px solid #222a3d;padding-left:12px}table{width:100%;border-collapse:collapse}th,td{padding:9px;border-bottom:1px solid #eee;text-align:right}th:nth-child(2),td:nth-child(2){text-align:left}</style></head><body><header><h1>Maastricht Student Neighbourhood Dashboard</h1><p>Balanced-profile results using official CBS 2025 neighbourhood data.</p></header><main><div class="panel"><div id="chart"></div></div><div class="panel"><table><thead><tr><th>Rank</th><th>Neighbourhood</th><th>Score</th></tr></thead><tbody id="rows"></tbody></table></div><div class="panel note"><strong>Important:</strong> average WOZ value is a relative housing-value proxy, not observed student rent. The model does not measure live room availability.</div></main><script>const data=[['Binnenstad',93.8],['Boschstraatkwartier',93.4],['Randwyck',91.9],['Statenkwartier',90.7],['Sint Maartenspoort',84.0],['Kommelkwartier',83.7],['Jekerkwartier',78.2],['Wyck',77.8],['Brusselsepoort',75.7],['Wyckerpoort',71.8]];const rev=[...data].reverse();Plotly.newPlot('chart',[{type:'bar',orientation:'h',y:rev.map(x=>x[0]),x:rev.map(x=>x[1]),text:rev.map(x=>x[1].toFixed(1)),textposition:'outside'}],{title:'Top neighbourhoods — balanced suitability score',xaxis:{range:[0,100],title:'Score'},margin:{l:145,r:45}},{displayModeBar:false,responsive:true});rows.innerHTML=data.map((x,i)=>`<tr><td>${i+1}</td><td>${x[0]}</td><td><b>${x[1].toFixed(1)}</b></td></tr>`).join('');</script></body></html>
